[main]
font=Hack Nerd Font:weight=bold:size=10
dpi-aware=yes
use-bold=yes
prompt="$ "
icon-theme=Papirus-Dark
icons-enabled=yes
match-mode=fzf
sort-result=yes
terminal=$TERMINAL -e  # Note: you cannot actually use environment variables here
image-size-ratio=0.3
exit-on-keyboard-focus-loss=no

[colors]
background = "#191724ff"
text = "#e0def4ff"
selection = "#2a273aff"
selection-text = "#e0def4ff"
match = "#c4a7e7ff"
selection-match = "#eb6f92ff"
border = "#eb6f92ff"
input="#e0def4ff"
prompt="#9ccfd8ff"

[border]
width=2
radius=0
